<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BAAO Unscramble</title>

<!-- Cartoon Font -->
<link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    font-family: 'Londrina Solid', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111;
    overflow: hidden;
    color: #fff;
}

/* Background */
#bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('BAAO_Logo.PNG') center/cover no-repeat;
    z-index: -2;
}

#overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* Main Menu */
#mainMenu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.3s;
}

#mainMenu h1 {
    font-size: 4em;
    margin-bottom: 40px;
    text-shadow: 0 0 10px orange, 0 0 20px blue;
}

.menuButton {
    padding: 15px 40px;
    font-size: 2em;
    margin: 10px;
    background: rgba(255,255,255,0.1);
    border: 2px solid #fff;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    transition: 0.2s all;
}

.menuButton:hover {
    transform: scale(1.1);
}

.menuButton.active {
    background: orange;
    color: #000;
    text-shadow: 0 0 10px #fff;
    transform: scale(1.15);
}

/* Mode Selection */
#modeSelect, #normalOptions, #levelSelectOptions, #mixedOptions, #pauseMenu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 11;
}

#modeSelect h2, #normalOptions h2, #levelSelectOptions h2, #mixedOptions h2 {
    font-size: 3em;
    margin-bottom: 20px;
}

.backBtn, .startGameBtn {
    padding: 10px 30px;
    font-size: 1.8em;
    margin-top: 20px;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid #fff;
    background: rgba(255,255,255,0.1);
    color: #fff;
    transition: 0.2s all;
}

.backBtn:hover, .startGameBtn:hover { transform: scale(1.1); }
.backBtn.active, .startGameBtn.active {
    background: orange;
    color: #000;
    transform: scale(1.15);
}

/* Options Buttons */
.optionsContainer {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.optionBtn {
    padding: 10px 20px;
    font-size: 1.6em;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid #fff;
    background: rgba(255,255,255,0.1);
    color: #fff;
    transition: 0.2s all;
}

.optionBtn.active {
    background: orange;
    color: #000;
    transform: scale(1.15);
}

/* Top bar */
#topBar {
    position: absolute;
    top: 20px;
    width: 90%;
    display: flex;
    justify-content: space-between;
    font-size: 1.3em;
}

/* Level display */
#levelDisplay {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.5em;
    text-shadow: 0 0 10px rgba(255,255,255,0.7);
}

/* Pause button */
#pauseBtn {
    position: absolute;
    top: 18px;
    left: 10px;
    padding: 8px 15px;
    background: #ffaa00;
    border: none;
    cursor: pointer;
}

/* Scrambled word */
#scrambledWord {
    font-size: 4em;
    letter-spacing: 12px;
    margin-bottom: 20px;
    color: white;
    -webkit-text-stroke: 1.4px blue;
    text-shadow: 0 0 5px orange, 0 0 10px orange;
}

/* Letters */
#letterContainer {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

.letterBox {
    border-bottom: 6px solid #fff;
    width: 55px;
    height: 60px;
    font-size: 3em;
    text-align: center;
    line-height: 60px;
    transition: transform 0.2s;

    color: white;

    /* NEW */
    font-weight: 900;
    -webkit-text-stroke: 2px black;
    text-shadow: 
        0 0 6px #fff,
        0 0 8px #000;
}

.letterBox.filled {
    color: white;
    text-shadow: 0 0 6px #fff, 0 0 4px Blue;
    animation: pop 0.2s ease;
}

@keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }

/* Alphabet */
#alphabetContainer {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 15px;
    width: 100%;
    max-width: 700px;
    padding: 10px;
    background: rgba(0,0,0,0.65);
    border-radius: 10px;
}

.alphabetLetter {
    font-size: 2.5em;
    color: rgba(255,255,255,0.5);
    text-align: center;
    transition: transform 0.2s, color 0.2s;
}

.alphabetLetter.active {
    color: #e87b0e;
    text-shadow: 0 0 10px blue;
    transform: scale(1.2);
}

/* --- NEW ANIMATIONS --- */

/* Pop effect for correct letters (already referenced in .letterBox.filled) */
@keyframes pop {
    0% { transform: scale(0.8); }
    100% { transform: scale(1); }
}

/* Shake effect for wrong letters */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

.letterBox.wrong {
    animation: shake 0.3s ease;
    color: red;
    text-shadow: 0 0 5px #ff0000;
}

/* Pulse effect for alphabet letters */
@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
}

#failScreen button:hover {
    transform: scale(1.1);
}
#failScreen h1 {
    animation: shake 0.5s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    50% { transform: translateX(10px); }
    75% { transform: translateX(-10px); }
    100% { transform: translateX(0); }
}

.alphabetLetter.pulse {
    animation: pulse 0.3s ease;
}

/* Hidden input */
input { opacity: 0; position: absolute; }
</style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>

<!-- MAIN MENU -->
<div id="mainMenu">
    <h1>BAAO Unscramble</h1>
    <button id="modesBtn" class="menuButton">Modes</button>
    <div id="bestStreakDisplay">Best Streak: 0</div>
</div>

<!-- MODE SELECT -->
<div id="modeSelect">
    <h2>Select Mode</h2>
    <div class="optionsContainer">
        <button id="normalModeBtn" class="optionBtn">Normal</button>
        <button id="levelSelectModeBtn" class="optionBtn">Level Select</button>
        <button id="mixedModeBtn" class="optionBtn">Mixed</button>
    </div>
    <button class="backBtn">Back</button>
</div>

<!-- NORMAL OPTIONS -->
<div id="normalOptions">
    <h2>Normal Mode</h2>
    <div class="optionsContainer" id="wordsPerLevelContainer"></div>
    <div class="optionsContainer" id="timerContainer">
        <button class="optionBtn" data-value="timed">Timed</button>
        <button class="optionBtn" data-value="untimed">Untimed</button>
    </div>
    <button class="startGameBtn">Start Game</button>
    <button class="backBtn">Back</button>
</div>

<!-- LEVEL SELECT OPTIONS -->
<div id="levelSelectOptions">
    <h2>Level Select Mode</h2>
    <div class="optionsContainer" id="levelButtonsContainer"></div>
    <div class="optionsContainer" id="levelTimerContainer">
        <button class="optionBtn" data-value="timed">Timed</button>
        <button class="optionBtn" data-value="untimed">Untimed</button>
    </div>
    <button class="startGameBtn">Start Game</button>
    <button class="backBtn">Back</button>
</div>

<!-- MIXED OPTIONS -->
<div id="mixedOptions">
    <h2>Mixed Mode</h2>
    <div class="optionsContainer" id="mixedTimerContainer">
        <button class="optionBtn" data-value="timed">Timed</button>
        <button class="optionBtn" data-value="untimed">Untimed</button>
    </div>
    <button class="startGameBtn">Start Game</button>
    <button class="backBtn">Back</button>
</div>

<!-- PAUSE MENU -->
<div id="pauseMenu">
    <h2>Paused</h2>
    <button id="resumeBtn" class="menuButton">Resume</button>
    <button id="mainMenuBtn" class="menuButton">Main Menu</button>
</div>

<!-- FAIL / RESTART SCREEN -->
<div id="failScreen" style="display:none; position:absolute; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 15; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-family: 'Londrina Solid', sans-serif;">
    <h1 style="font-size:5em; color:red; text-shadow: 0 0 15px orange, 0 0 25px yellow;">Time's Up!</h1>
    <div style="font-size:2em; margin:20px;">You ran out of time!</div>
    <div style="font-size:1.5em; margin:20px;" id="failStreakDisplay"></div>
    <button id="restartBtn" style="padding:15px 40px; font-size:2em; border-radius:10px; background:orange; color:black; border:none; cursor:pointer; transition:0.2s all;">Restart</button>
    <button id="mainMenuFailBtn" style="padding:15px 40px; font-size:2em; border-radius:10px; background:#fff; color:black; border:none; cursor:pointer; margin-top:10px; transition:0.2s all;">Main Menu</button>
</div>

<!-- GAME PLAY -->
<div id="topBar">
    <div id="timer">25</div>
    <div>
        <div id="streak">Streak: 0</div>
        <div id="best">Best: 0</div>
    </div>
</div>

<div id="levelDisplay"></div>
<div id="pauseBtn">Pause</div>
<div id="scrambledWord"></div>
<div id="letterContainer"></div>
<div id="alphabetContainer"></div>

<!-- SKIP BUTTON FOR UNTIMED MODES -->
<button id="skipBtn" 
        style="display:none; 
               position:absolute; 
               bottom:50px; 
               font-size:1.8em; 
               padding:10px 20px; 
               border-radius:10px; 
               cursor:pointer; 
               border:2px solid #fff; 
               background:rgba(255,255,255,0.1); 
               color:#fff;">
    Skip
</button>

<input id="hiddenInput" autofocus/>

<!-- WORD FILES -->
<script src="words5.js"></script>
<script src="words6.js"></script>
<script src="words7.js"></script>
<script src="words8.js"></script>
<script src="words9.js"></script>
<script src="words10.js"></script>
<script src="words11.js"></script>
<script src="words12.js"></script>
<script src="words13.js"></script>
<script src="words14.js"></script>
<script src="words15.js"></script>
<script src="words16.js"></script>
<script src="words17.js"></script>

<script>
// --- SOUNDS ---
const clickSound = new Audio("click.mp3");
const correctSound = new Audio("correct.mp3");
const failSound = new Audio("fail.mp3");
const buttonSound = new Audio("button.mp3");
function playSound(sound){ sound.currentTime=0; sound.play(); }

// --- GAME STATE ---
let mode=null;
let levelWords=[], usedWords=[];
let currentWord="", allowedLetters=[];
let timer=25, timerInterval;
let streak=0, best=localStorage.getItem("best")||0;
let paused=false, timedMode=true;
let shuffledWords = [];
let currentIndex = 0;

let wordsPerLevel=20;
let selectedLevel=5;

let isTransitioning = false;

// NEW progression tracking
let currentLevel=5;
let wordsCompleted=0;

document.getElementById("best").innerText="Best: "+best;
document.getElementById("bestStreakDisplay").innerText="Best Streak: "+best;

// --- DOM ---
const mainMenu=document.getElementById("mainMenu"),
      modesBtn=document.getElementById("modesBtn"),
      modeSelect=document.getElementById("modeSelect"),
      normalOptions=document.getElementById("normalOptions"),
      levelSelectOptions=document.getElementById("levelSelectOptions"),
      mixedOptions=document.getElementById("mixedOptions"),
      pauseMenu=document.getElementById("pauseMenu"),
      normalModeBtn=document.getElementById("normalModeBtn"),
      levelSelectModeBtn=document.getElementById("levelSelectModeBtn"),
      mixedModeBtn=document.getElementById("mixedModeBtn"),
      hiddenInput=document.getElementById("hiddenInput"),
      levelDisplay=document.getElementById("levelDisplay");
      const skipBtn = document.getElementById("skipBtn");

function showPanel(p){p.style.display="flex";}
function hidePanel(p){p.style.display="none";}
function clearActiveButtons(c){c.querySelectorAll(".optionBtn").forEach(b=>b.classList.remove("active"));}

// --- SKIP BUTTON CLICK HANDLER ---
skipBtn.onclick = () => {
    hiddenInput.value = ""; // clear input
    const boxes = document.querySelectorAll(".letterBox");
    boxes.forEach(b => {
        b.textContent = '';
        b.classList.remove("filled", "wrong");
    });

    // Skip current word
    nextWord(true); // true flag = skip
};

// --- SHUFFLE HELPER ---
function shuffleArray(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// --- MENU EVENTS ---
modesBtn.onclick=()=>{
    playSound(buttonSound);
    hidePanel(mainMenu);
    showPanel(modeSelect);
}

// NORMAL MODE (RESET LEVEL TO 5 ALWAYS)
normalModeBtn.onclick=()=>{
    playSound(buttonSound);
    clearActiveButtons(modeSelect);
    normalModeBtn.classList.add("active");

    mode='normal';

    // 🔥 RESET LEVEL
    selectedLevel = 5;

    hidePanel(modeSelect);
    showPanel(normalOptions);
    createWordsPerLevelButtons();
}

levelSelectModeBtn.onclick=()=>{
    playSound(buttonSound);
    clearActiveButtons(modeSelect);
    levelSelectModeBtn.classList.add("active");
    mode='levelSelect';
    hidePanel(modeSelect);
    showPanel(levelSelectOptions);
    createLevelButtons();
}

mixedModeBtn.onclick=()=>{
    playSound(buttonSound);
    clearActiveButtons(modeSelect);
    mixedModeBtn.classList.add("active");
    mode='mixed';
    hidePanel(modeSelect);
    showPanel(mixedOptions);
}

// BACK BUTTONS
document.querySelectorAll(".backBtn").forEach(b=>b.onclick=()=>{
    playSound(buttonSound);

    clearInterval(timerInterval);

    hidePanel(normalOptions);
    hidePanel(levelSelectOptions);
    hidePanel(mixedOptions);
    hidePanel(modeSelect);
    showPanel(mainMenu);
});

// TIMER MODE SELECT
document.querySelectorAll("#timerContainer .optionBtn, #levelTimerContainer .optionBtn, #mixedTimerContainer .optionBtn")
.forEach(b=>{
    b.onclick=()=>{
        playSound(buttonSound);
        clearActiveButtons(b.parentNode);
        b.classList.add("active");
        timedMode = b.dataset.value==="timed";

// ✅ SHOW/HIDE SKIP BUTTON
        if(!timedMode){
            skipBtn.style.display = "block";  // Untimed → show Skip
        } else {
            skipBtn.style.display = "none";   // Timed → hide Skip
        }
    };
});

// --- WORD BUTTONS ---
function createWordsPerLevelButtons(){
    const container=document.getElementById("wordsPerLevelContainer");
    container.innerHTML="";
    [5,10,15,20,25].forEach(n=>{
        let btn=document.createElement("button");
        btn.innerText=n+" Words";
        btn.className="optionBtn";
        btn.onclick=()=>{
            playSound(buttonSound);
            clearActiveButtons(container);
            btn.classList.add("active");
            wordsPerLevel=n;
        };
        if(n===20) btn.classList.add("active");
        container.appendChild(btn);
    });
}

function createLevelButtons(){
    const container=document.getElementById("levelButtonsContainer");
    container.innerHTML="";
    for(let i=5;i<=17;i++){
        let btn=document.createElement("button");
        btn.innerText="Level "+i;
        btn.className="optionBtn";
        btn.onclick=()=>{
            playSound(buttonSound);
            clearActiveButtons(container);
            btn.classList.add("active");
            selectedLevel=i;
        };
        if(i===5) btn.classList.add("active");
        container.appendChild(btn);
    }
}

function getWordsForLevel(lvl){
    switch(lvl){
        case 5:return words5.slice();
        case 6:return words6.slice();
        case 7:return words7.slice();
        case 8:return words8.slice();
        case 9:return words9.slice();
        case 10:return words10.slice();
        case 11:return words11.slice();
        case 12:return words12.slice();
        case 13:return words13.slice();
        case 14:return words14.slice();
        case 15:return words15.slice();
        case 16:return words16.slice();
        case 17:return words17.slice();
        default:return [];
    }
}

// --- START GAME ---
document.querySelectorAll(".startGameBtn").forEach(btn=>{
    btn.onclick=()=>{
        playSound(buttonSound);

        hidePanel(normalOptions);
        hidePanel(levelSelectOptions);
        hidePanel(mixedOptions);
        hidePanel(mainMenu);

        startGame();
    };
});

function startGame(){
    hideFailScreen();
    streak = 0;
    document.getElementById("streak").innerText = "Streak: " + streak;

    usedWords = [];
    wordsCompleted = 0;

    if (mode === 'normal') {
        currentLevel = 5;
        loadLevel(currentLevel);
    }
    else if (mode === 'levelSelect') {
        currentLevel = selectedLevel;
        loadLevel(currentLevel);
    }
    else if (mode === 'mixed') {
        // Collect all words from levels 5–17
        levelWords = [];
        for (let i = 5; i <= 17; i++) {
            levelWords = levelWords.concat(getWordsForLevel(i));
        }
        shuffledWords = shuffleArray(levelWords.slice()); // shuffle the pool
        currentIndex = 0;
        usedWords = [];
    }

    // After setting timedMode and mode
        if(!timedMode){
            skipBtn.style.display = "block";
        } else {
            skipBtn.style.display = "none";
        }

    nextWord();        // ✅ inside the function
    hiddenInput.focus(); // ✅ inside the function
}

// LOAD LEVEL
function loadLevel(level){
    levelWords = getWordsForLevel(level);       // get words for this level
    shuffledWords = shuffleArray(levelWords.slice()); // shuffle a copy
    currentIndex = 0;                            // start at first word
    usedWords = [];                              // optional, can still track used words if needed
    wordsCompleted = 0;
}

// --- TIMER ---
function startTimer(){
    clearInterval(timerInterval);

    if(!timedMode){
        document.getElementById("timer").innerText='';
        return;
    }

    timer=25;
    document.getElementById("timer").innerText=timer;

    timerInterval = setInterval(() => {
    // Pause check
    if (paused) return;

    // Timed mode logic
    if (timedMode) {
        timer--;
        document.getElementById("timer").innerText = timer;

        // Time ran out → fail
        if (timer <= 0) {
            clearInterval(timerInterval); // Stop the timer
            playSound(failSound);        // Play fail sound
            showFailScreen();   // show streak BEFORE reset
            streak = 0;                  // Reset streak
            document.getElementById("streak").innerText = "Streak: " + streak;

        }
     }
   }, 1000); // Run this function every 1 second
}

// --- SCRAMBLE ---
function shuffleWord(word){
    let shuffled;
    do {
        shuffled = word.split('').sort(()=>Math.random()-0.5).join('');
    } while (shuffled === word);
    return shuffled;
}

// --- NEXT WORD ---
function nextWord(skip = false) {
    if (isTransitioning) return;
    isTransitioning = true;

    // --- NORMAL MODE ---
    if (mode === 'normal' && !skip) { 
    if (wordsCompleted >= wordsPerLevel) {
        currentLevel++;
        if (currentLevel > 17) {
            alert("You beat Normal Mode!");
            clearInterval(timerInterval);
            return showPanel(mainMenu);
        }
        loadLevel(currentLevel);
    }
}

    // --- LOAD LEVEL SELECT OR MIXED MODE IF SHUFFLED WORDS EMPTY ---
    if ((mode === 'levelSelect' || mode === 'mixed') && shuffledWords.length === 0) {
        if (mode === 'levelSelect') {
            loadLevel(selectedLevel);
        } else if (mode === 'mixed') {
            levelWords = [];
            for (let i = 5; i <= 17; i++) {
                levelWords = levelWords.concat(getWordsForLevel(i));
            }
            shuffledWords = shuffleArray(levelWords.slice());
            currentIndex = 0;
            usedWords = [];
        }
    }

    // --- NO MORE WORDS IN CURRENT SHUFFLE ---
    if (currentIndex >= shuffledWords.length) {
        // Optional: reshuffle for mixed mode only to keep going
        if (mode === 'mixed') {
            shuffledWords = shuffleArray(levelWords.slice());
            currentIndex = 0;
        } else {
            return; // normal & levelSelect stop here
        }
    }

    // --- PICK NEXT WORD ---
    currentWord = shuffledWords[currentIndex++];
    usedWords.push(currentWord);

    showScrambled(currentWord);
    startTimer();

    setTimeout(() => {
        isTransitioning = false;
    }, 50);
}


// --- DISPLAY ---
function showScrambled(word){
    const scrambled=shuffleWord(word);
    document.getElementById("scrambledWord").innerText=scrambled.toUpperCase();

    const container=document.getElementById("letterContainer");
    container.innerHTML='';

    for(let i=0;i<word.length;i++){
        let box=document.createElement("div");
        box.className="letterBox";
        container.appendChild(box);
    }

    allowedLetters=word.toUpperCase().split('');

    updateAlphabet();
    updateLevelDisplay();
}

// --- LEVEL DISPLAY ---
function updateLevelDisplay(){

    // 🔥 MIXED MODE = LEVEL BASED ON WORD LENGTH
    if(mode === 'mixed'){
        levelDisplay.innerText = `Level ${currentWord.length}`;
        return;
    }

    // NORMAL MODE
    if(mode === 'normal'){
        levelDisplay.innerText = `Level ${currentLevel} (${wordsCompleted}/${wordsPerLevel})`;
        return;
    }

    // LEVEL SELECT
    if(mode === 'levelSelect'){
        levelDisplay.innerText = `Level ${currentLevel}`;
        return;
    }
}

// --- INPUT ---
hiddenInput.addEventListener("input", e=>{
    // --- BLOCK INPUT WHEN NOT PLAYING ---
    if (paused || failScreen.style.display === "flex" || mainMenu.style.display === "flex") {
        hiddenInput.value = ""; // clear anything typed while paused
        return;
    }

    let val = e.target.value.toUpperCase();

    // ✅ ONLY FILTER LETTERS (no count restriction anymore)
    let filtered = "";

    for(let char of val){
        if(allowedLetters.includes(char)){
            filtered += char;
        }
    }

    // Limit to word length
    filtered = filtered.slice(0, allowedLetters.length);
    hiddenInput.value = filtered;

    const boxes = document.querySelectorAll(".letterBox");

    boxes.forEach((b, i) => {
    b.classList.remove("filled");
    b.textContent = "";

    if (filtered[i]) {
        b.textContent = filtered[i];

        // 🔊 CLICK SOUND (only when valid letter placed)
        playSound(clickSound);

        // ✅ Pulse only the newly typed letter
if (i === filtered.length - 1) { // only last letter typed
    const letterDiv = [...document.querySelectorAll(".alphabetLetter")]
        .find(l => l.innerText === filtered[i]);
    if (letterDiv) {
        letterDiv.classList.remove("pulse");
        void letterDiv.offsetWidth; // force reflow
        letterDiv.classList.add("pulse");
    }
}

        // All typed letters styled the same
        b.classList.add("filled"); // pop animation
        b.style.color = "white";
        b.style.textShadow = "0 0 3px black, 0 0 2px black";
    } // <-- closes the if(filtered[i]) block
}); // <-- closes the boxes.forEach

    // ✅ CORRECT WORD
    if(filtered === allowedLetters.join('')){
        clearInterval(timerInterval); // 🔥 ADD THIS
        playSound(correctSound);

        streak++;

        if(streak > best){
            best = streak;
            localStorage.setItem("best", best);
            document.getElementById("best").innerText = "Best: " + best;
            document.getElementById("bestStreakDisplay").innerText = "Best Streak: " + best;
        }

        document.getElementById("streak").innerText = "Streak: " + streak;

        wordsCompleted++;

         setTimeout(() => {
            hiddenInput.value = '';
            nextWord();
        }, 200);
        return;
    }

    // ❌ Wrong full word → shake + clear
if (filtered.length === allowedLetters.length && filtered !== allowedLetters.join('')) {
    boxes.forEach(b => b.classList.add("wrong")); // optional shake animation

    setTimeout(() => {
        hiddenInput.value = '';
        boxes.forEach(b => {
            b.textContent = '';
            b.classList.remove("filled", "wrong");
        });
    }, 300);
}
});


// --- ALPHABET ---
function updateAlphabet(){
    const alphaContainer=document.getElementById("alphabetContainer");
    alphaContainer.innerHTML='';

    for(let c=65;c<=90;c++){
        const l=document.createElement("div");
        l.className="alphabetLetter";
        l.innerText=String.fromCharCode(c);

        if(allowedLetters.includes(String.fromCharCode(c))){
            l.classList.add("active");
        }

        alphaContainer.appendChild(l);
    }
}

// --- FOCUS FIX ---
document.addEventListener("click", ()=>{
    hiddenInput.focus();
});

// --- PAUSE ---
document.getElementById("pauseBtn").onclick=()=>{
    paused=true;
    showPanel(pauseMenu);
}

document.getElementById("resumeBtn").onclick=()=>{
    paused=false;
    hidePanel(pauseMenu);
    hiddenInput.focus();
};

document.getElementById("mainMenuBtn").onclick=()=>{
    paused=false;
    hidePanel(pauseMenu);
    showPanel(mainMenu);
    clearInterval(timerInterval);
}

document.addEventListener("keydown", (e)=>{
    if(e.key === "Escape"){

        // IF PAUSED → RESUME
        if(paused){
            paused = false;
            hidePanel(pauseMenu);
            hiddenInput.focus();
        }
        // IF PLAYING → PAUSE
        else{
            paused = true;
            showPanel(pauseMenu);
        }
    }
});

    const failScreen = document.getElementById("failScreen");
    const restartBtn = document.getElementById("restartBtn");
    const mainMenuFailBtn = document.getElementById("mainMenuFailBtn");
    const failStreakDisplay = document.getElementById("failStreakDisplay");

    // Show Fail Screen
    function showFailScreen() {
        failStreakDisplay.innerText = "Streak: " + streak;
        failScreen.style.display = "flex";
    }

    // Hide Fail Screen
    function hideFailScreen() {
        failScreen.style.display = "none";
    }

   // Restart button
restartBtn.onclick = () => {
    hideFailScreen();
    wordsCompleted = 0;
    document.getElementById("streak").innerText = "Streak: " + streak;

    clearInterval(timerInterval); // stop any leftover timer

    startGame(); // ✅ Starts the game using the current mode
};

    // Main Menu button
    mainMenuFailBtn.onclick = () => {
        hideFailScreen();
        showPanel(mainMenu);
        clearInterval(timerInterval);
    };

</script>
